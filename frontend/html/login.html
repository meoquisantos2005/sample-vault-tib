<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SampleVault - Login</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>

<body class="w3-display-container" style="height:100vh;">

    <div class="w3-display-middle w3-mobile" style="width:400px;">

        <div class="w3-card-4 w3-padding-large w3-round-large w3-dark-grey">

            <h2 class="w3-center w3-text-yellow"><b>SAMPLEVAULT</b></h2>

            <p class="w3-center w3-text-white">
                Ingresa a tu biblioteca de sonidos
            </p>

            <!-- LOGIN COMPATIBLE CON TU JS -->
            <div>
                <label class="w3-text-white">Usuario</label>
                <input id="usernameInput"
                       class="w3-input w3-border w3-round w3-margin-bottom"
                       type="text"
                       placeholder="Usuario">

                <label class="w3-text-white">Contraseña</label>
                <input id="passwordInput"
                       class="w3-input w3-border w3-round w3-margin-bottom"
                       type="password"
                       placeholder="Contraseña">

                <button id="loginBtn"
                        class="w3-button w3-yellow w3-block w3-round-large">
                    ENTRAR
                </button>
            </div>

            <p class="w3-small w3-center w3-text-white w3-margin-top">
                ¿No tenés cuenta?
            <a href="/html/register.html" class="w3-text-yellow">
                Registrarte
            </a>
            </p>

        </div>
    </div>

    <!-- TU SCRIPT ORIGINAL (NO TOCADO) -->
    <script src="../js/tests/login.js"></script>

</body>
</html>
