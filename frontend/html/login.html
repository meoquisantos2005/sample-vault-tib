<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - SampleVault</title>
    <link rel="stylesheet" href="../css/w3.css">
</head>

<body class="w3-dark-grey">

<div class="w3-container w3-padding-32">

    <h2 class="w3-text-yellow">Login</h2>

    <input id="usernameInput" class="w3-input w3-margin-bottom" placeholder="Usuario">
    <input id="passwordInput" type="password" class="w3-input w3-margin-bottom" placeholder="Contraseña">

    <button id="loginBtn" class="w3-button w3-green">
        Iniciar sesión
    </button>

    <!-- ✔ LINK REGISTRO -->
    <p class="w3-text-white w3-margin-top">
        ¿No tenés cuenta?
        <a href="/html/register.html">
            Registrarte
        </a>
    </p>

</div>

<script src="../js/tests/login.js"></script>

</body>
</html>
