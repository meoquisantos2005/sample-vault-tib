<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sample Vault - Mis Sonidos</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>

<body class="w3-dark-grey">

<!-- HEADER SIMPLE (NO ROMPE LOGICA) -->
<div class="w3-container w3-padding-32">

    <h1 class="w3-text-yellow w3-center">
        <b>Sample Vault</b>
    </h1>

    <p class="w3-center w3-text-white">
        Upload & Manage Audio Samples
    </p>

    <hr>

    <div class="w3-row-padding">

        <!-- IZQUIERDA: SUBIDA (NO TOCAR LOGICA) -->
        <div id="test-container" class="w3-col l4 m5 s12">

            <h3 class="w3-text-green">Upload Sample</h3>

            <!-- IMPORTANTE: NO CAMBIADO -->
            <input type="file" id="audioInput" class="w3-margin-top" />

            <!-- IMPORTANTE: NO CAMBIADO -->
            <button id="mimeTestBtn" class="w3-button w3-red w3-margin-top">
                Upload
            </button>

        </div>

        <!-- DERECHA: BIBLIOTECA -->
        <div class="w3-col l8 m7 s12">

            <h3 class="w3-text-white">Mis Samples</h3>

            <table class="w3-table w3-striped w3-bordered w3-white">
                <thead>
                    <tr class="w3-yellow">
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="sampleList">
                    <!-- JS llenará esto -->
                </tbody>
            </table>

        </div>

    </div>
</div>

<!-- MODAL (INTACTO - NO TOCAR) -->
<div id="errorModal" class="w3-modal">
    <div class="w3-modal-content w3-card-4 w3-animate-top" style="max-width: 500px;">

        <header class="w3-container w3-red">
            <span onclick="document.getElementById('errorModal').style.display='none'"
                  class="w3-button w3-display-topright">&times;</span>

            <h3 id="modalTitle">Error</h3>
        </header>

        <div class="w3-container w3-padding">
            <p id="modalMessage">Waiting...</p>
        </div>

    </div>
</div>

<!-- SCRIPT ORIGINAL (OBLIGATORIO) -->
<script src="../js/tests/mimeTest.js"></script>

<!-- EXTRA (NO ROMPE MIME) -->
<script src="../js/tests/sampleList.js"></script>

</body>
</html>
