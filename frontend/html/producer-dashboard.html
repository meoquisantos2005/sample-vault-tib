<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sample Vault</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon-bw.png">
</head>

<body class="w3-dark-grey">

<div class="w3-container w3-padding-32">

    <!-- HEADER TIPO APP -->
    <h1 class="w3-text-yellow w3-center">
        <b>Sample Vault</b>
    </h1>

    <p class="w3-center w3-text-white">
        Upload & Test Audio Samples
    </p>

    <hr>

    <div class="w3-row-padding">

        <!-- IZQUIERDA -->
        <div id="test-container" class="w3-col l6 m12 s12">

            <h3 class="w3-text-green">Upload Sample</h3>

            <!-- INPUT (NO TOCAR) -->
            <input type="file" id="audioInput" class="w3-margin-top" />

            <!-- BOTÓN (NO TOCAR) -->
            <button id="mimeTestBtn" class="w3-button w3-red w3-margin-top">
                Upload
            </button>

        </div>

        <!-- DERECHA -->
        <div class="w3-col l6 m12 s12">

            <h3 class="w3-text-white">Samples Console</h3>

            <div id="api-console"
                 class="w3-code w3-black w3-border-yellow w3-border w3-padding"
                 style="min-height: 400px; overflow-y: auto;">
                Waiting for uploads...
            </div>
            <hr>
        </div>

    </div>
</div>

<!-- MODAL (INTACTO) -->
<div id="errorModal" class="w3-modal">
    <div class="w3-modal-content w3-card-4 w3-animate-top" style="max-width: 500px;">

        <header class="w3-container w3-red">
            <span onclick="document.getElementById('errorModal').style.display='none'"
                  class="w3-button w3-display-topright">&times;</span>

            <h3 id="modalTitle">Error</h3>
        </header>

        <div class="w3-container w3-padding">
            <p id="modalMessage">Waiting...</p>
        </div>

    </div>
</div>

<!-- SCRIPT (NO TOCAR) -->
<script src="../js/tests/mimeTest.js"></script>

</body>
</html>
