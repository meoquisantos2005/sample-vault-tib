<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SampleVault - Registro</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>

<body class="w3-display-container" style="height:100vh;">

    <div class="w3-display-middle w3-mobile" style="width:400px;">

        <div class="w3-card-4 w3-padding-large w3-round-large w3-dark-grey">

            <h2 class="w3-center w3-text-yellow"><b>CREAR CUENTA</b></h2>

            <p class="w3-center w3-text-white">
                Registro de usuario SampleVault
            </p>

            <!-- COMPATIBLE CON TU register.js -->
            <label class="w3-text-white">Usuario</label>
            <input id="usernameInput"
                   class="w3-input w3-border w3-round w3-margin-bottom"
                   type="text"
                   placeholder="Usuario">

            <label class="w3-text-white">Contraseña</label>
            <input id="passwordInput"
                   class="w3-input w3-border w3-round w3-margin-bottom"
                   type="password"
                   placeholder="Contraseña">

            <button id="registerBtn"
                    class="w3-button w3-yellow w3-block w3-round-large">
                REGISTRARSE
            </button>

            <p class="w3-small w3-center w3-text-white w3-margin-top">
                ¿Ya tenés cuenta?
                <a href="/html/login.html" class="w3-text-yellow">
                    Iniciar sesión
                </a>
            </p>

        </div>
    </div>

    <!-- TU SCRIPT ORIGINAL -->
    <script src="../js/tests/register.js"></script>

</body>
</html>
