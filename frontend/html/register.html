<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="../css/w3.css">
</head>

<body class="w3-dark-grey">

<div class="w3-container w3-padding-32 w3-center">

    <h2 class="w3-text-yellow">Registro</h2>

    <div class="w3-card w3-padding w3-white w3-round" style="max-width:400px;margin:auto">

        <input id="usernameInput" class="w3-input w3-margin-bottom" placeholder="Usuario">
        <input id="passwordInput" type="password" class="w3-input w3-margin-bottom" placeholder="Contraseña">

        <button id="registerBtn" class="w3-button w3-blue w3-block">
            Registrarse
        </button>

        <p class="w3-small w3-margin-top">
            ¿Ya tenés cuenta?
            <a href="/login">Iniciar sesión</a>
        </p>

        <pre id="api-console"></pre>

    </div>

</div>

<script src="../js/tests/register.js"></script>

</body>
</html>
